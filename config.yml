server:
  host: 0.0.0.0
  port: 8081
  reload: false
  log_level: info
  cors_origins:
  - '*'
database:
  # Main database for global settings, users, and sessions
  path: data/main.db
  echo: false
storage:
  # Note: Each library will have its own covers directory under ./data/<LibraryName>/covers/
  # This setting is for legacy/fallback shared covers
  covers_dir: data/covers
  cache_dir: null
features:
  legacy_api: true
  modern_api: true
  reading_progress: true
  series_detection: true
  collections: true
  auto_thumbnails: true
libraries:
- name: Manga
  path: /path/to/manga
  auto_scan: true
  scan_on_startup: false
  settings:
    sort_mode: folders_first
    default_reading_direction: rtl
- name: Comics
  path: /mnt/Blue/Ebooks_Comics/Comics
  auto_scan: true
  scan_on_startup: false
  settings:
    sort_mode: folders_first
    default_reading_direction: ltr
