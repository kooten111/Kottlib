# YACLib Enhanced Configuration File
# Copy this to config.yml and customize for your setup

# Server settings
server:
  host: "0.0.0.0"        # Listen on all interfaces (use "127.0.0.1" for local only)
  port: 8081             # Server port
  reload: false          # Auto-reload on code changes (development only)
  log_level: "info"      # Log level: debug, info, warning, error
  cors_origins:          # CORS allowed origins
    - "*"                # Allow all (use specific domains in production)

# Database settings
database:
  path: null             # null = auto-detect platform default
                         # Or specify: "/path/to/yaclib.db"
  echo: false            # Log all SQL queries (debugging)

# Storage settings
storage:
  covers_dir: null       # null = auto-detect (same dir as database)
                         # Or specify: "/path/to/covers"
  cache_dir: null        # Temporary page cache (optional)

# Feature flags
features:
  legacy_api: true       # YACReader-compatible API
  modern_api: true       # Modern JSON REST API
  reading_progress: true # Track reading progress
  series_detection: true # Auto-detect series
  collections: true      # User collections/reading lists
  auto_thumbnails: true  # Auto-generate thumbnails on scan

# Library definitions
libraries:
  # Example: Comics library
  - name: "Comics"
    path: "/mnt/Comics"
    auto_scan: true      # Monitor for changes
    scan_on_startup: false  # Scan immediately on server start
    settings:
      sort_mode: "folders_first"
      default_reading_direction: "ltr"  # ltr (comics) or rtl (manga)

  # Example: Manga library
  - name: "Manga"
    path: "/mnt/Manga"
    auto_scan: true
    scan_on_startup: false
    settings:
      sort_mode: "folders_first"
      default_reading_direction: "rtl"  # Right-to-left for manga

  # Add more libraries as needed
  # - name: "Marvel"
  #   path: "/mnt/Comics/Marvel"
  #   auto_scan: true
  #   scan_on_startup: false

# Environment variables (override config file):
# YACLIB_HOST - Server host
# YACLIB_PORT - Server port
# YACLIB_DB_PATH - Database path
# YACLIB_LOG_LEVEL - Log level
